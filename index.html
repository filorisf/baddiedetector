<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baddie Detector</title>
  <meta name="description" content="Drop a photo. Find out the truth. Baddie score from 0 to 100.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── UPLOAD SECTION ── -->
  <section id="upload-section" class="section active">
    <div class="container">

      <header>
        <div class="deco-row" aria-hidden="true">
          <span class="deco-star">&#10022;</span>
          <span class="deco-heart">&#9825;</span>
          <span class="deco-star">&#10022;</span>
          <span class="deco-heart">&#9825;</span>
          <span class="deco-star">&#10022;</span>
        </div>
        <h1>Baddie<br><span class="title-outline">Detector</span></h1>
        <p class="subtitle">drop ur photo &amp; find out<br>ur baddie score from 0 to 100</p>
        <div class="deco-row" aria-hidden="true">
          <span class="deco-heart">&#9825;</span>
          <span class="deco-star">&#10022;</span>
          <span class="deco-heart">&#9825;</span>
          <span class="deco-star">&#10022;</span>
          <span class="deco-heart">&#9825;</span>
        </div>
      </header>

      <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" hidden>

        <div class="upload-prompt" id="upload-prompt">
          <div class="upload-icon-wrap">
            <span class="upload-deco">&#10022;</span>
            <svg class="upload-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M24 32V16M24 16L17 23M24 16L31 23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 36a8 8 0 0 1 0-16 10 10 0 0 1 19.8-2A8 8 0 1 1 40 36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="upload-main">drop ur photo here</p>
          <p class="upload-sub">or <button class="link-btn" id="browse-btn">browse files</button></p>
          <p class="upload-hint">JPG &middot; PNG &middot; WEBP &mdash; max 10MB</p>
        </div>

        <div class="preview-wrap" id="preview-wrap" style="display:none">
          <img id="preview-img" src="" alt="Preview">
          <div class="preview-meta">
            <p id="preview-filename" class="preview-filename"></p>
            <button class="link-btn" id="change-btn">change photo</button>
          </div>
        </div>
      </div>

      <button class="detect-btn" id="detect-btn" disabled>
        Detect a Baddie
      </button>

      <p class="footer-note">&#10022; &nbsp; for fun only &nbsp; &#10022;</p>
      <div class="footer-links">
        <a href="https://www.instagram.com/loris.fi/" target="_blank" rel="noopener" class="footer-link">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
          @loris.fi
        </a>
        <span class="footer-dot">&#10022;</span>
        <a href="https://www.tiktok.com/@loris.fi" target="_blank" rel="noopener" class="footer-link">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>
          @loris.fi
        </a>
        <span class="footer-dot">&#10022;</span>
        <a href="https://github.com/filorisf/baddiedetector" target="_blank" rel="noopener" class="footer-link">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          Source code
        </a>
      </div>
    </div>
  </section>

  <!-- ── LOADING SECTION ── -->
  <section id="loading-section" class="section">
    <div class="container">
      <div class="loading-wrap">
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <span class="spinner-star">&#9825;</span>
        </div>
        <p class="loading-title">analyzing ur baddie level</p>
        <p class="loading-sub">hold on bestie&#8230;</p>
      </div>
    </div>
  </section>

  <!-- ── RESULT SECTION ── -->
  <section id="result-section" class="section">
    <div class="container result-container">
      <button class="back-btn" id="back-btn">&#8592; try another</button>

      <div class="result-layout">
        <div class="result-photo-wrap">
          <img id="result-img" src="" alt="Result">
          <div class="photo-sticker">&#9825;</div>
        </div>

        <div class="result-info">
          <div class="score-ring-wrap">
            <svg class="score-ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FF69B4"/>
                  <stop offset="50%" stop-color="#CC44FF"/>
                  <stop offset="100%" stop-color="#00D4FF"/>
                </linearGradient>
              </defs>
              <circle class="ring-track" cx="100" cy="100" r="80"/>
              <circle class="ring-fill" id="ring-fill" cx="100" cy="100" r="80"/>
            </svg>
            <div class="score-center">
              <span class="score-num" id="score-num">0</span>
              <span class="score-denom">/100</span>
            </div>
          </div>

          <div class="result-label-wrap">
            <span class="result-star" aria-hidden="true">&#10022;</span>
            <p class="result-label" id="result-label"></p>
            <span class="result-star" aria-hidden="true">&#10022;</span>
          </div>

          <p class="result-desc" id="result-desc"></p>

          <div class="result-tags" id="result-tags"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── LANGUAGE SELECTOR ── -->
  <div class="lang-selector" id="lang-selector">
    <button class="lang-btn" id="lang-btn">
      <span id="lang-flag">🇺🇸</span>
      <span id="lang-code">EN</span>
      <span class="lang-arrow">▾</span>
    </button>
    <div class="lang-dropdown" id="lang-dropdown">
      <button class="lang-option active" data-lang="EN" data-flag="🇺🇸">🇺🇸 English</button>
      <button class="lang-option" data-lang="FR" data-flag="🇫🇷">🇫🇷 Français</button>
      <button class="lang-option" data-lang="ES" data-flag="🇪🇸">🇪🇸 Español</button>
      <button class="lang-option" data-lang="PT" data-flag="🇧🇷">🇧🇷 Português</button>
      <button class="lang-option" data-lang="IT" data-flag="🇮🇹">🇮🇹 Italiano</button>
      <button class="lang-option" data-lang="DE" data-flag="🇩🇪">🇩🇪 Deutsch</button>
      <button class="lang-option" data-lang="ZH" data-flag="🇨🇳">🇨🇳 中文</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
